info:
  name: Student Login
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:8080/api/users/login
  headers:
    - name: Authorization
      value: "Bearer "
  body:
    type: json
    data: |-
      {
        "email": "student@gmail.com",
        "password": "123456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
